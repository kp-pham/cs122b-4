<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
        <link rel="icon" type="image/x-icon" href="../images/favicon.ico">
        <link href="https://fonts.googleapis.com/css?family=Fugaz+One" rel="stylesheet">
        <link href="../styles.css" rel="stylesheet">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
              integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
        <title>Add Stars</title>
    </head>
    <body class="d-flex flex-column vh-100">
        <div id="nav-placeholder"></div>

        <div id="stars" class="w-50 m-auto p-5 shadow">
            <h2>Add Stars</h2>
            <div id="alert-success" class="alert alert-success p-2 d-none" role="alert"></div>
            <div id="alert-failure" class="alert alert-danger p-2 d-none" role="alert"></div>

            <form id="stars-form" method="POST" action="#" class="d-flex flex-column gap-3">
                <div class="d-flex flex-column">
                    <label for="name">Name: </label>
                    <input name="name" type="text" id="name" style="font-family: 'Arial', sans-serif;"
                           required autocomplete="name">
                </div>

                <div class="d-flex flex-column">
                    <label for="birthYear">Birth Year: </label>
                    <input name="birthYear" type="number" id="birthYear" min="0">
                </div>

                <button type="submit" class="rounded p-2 text-white bg-dark">Submit</button>
            </form>
        </div>

        <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.2.1/jquery.min.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.12.9/umd/popper.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
                integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

        <script src="scripts/utils.js"></script>
        <script src="scripts/stars.js"></script>
    </body>
</html>

<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
        <link rel="icon" type="image/x-icon" href="images/favicon.ico">
        <link href="https://fonts.googleapis.com/css?family=Fugaz+One" rel="stylesheet">
        <link href="styles.css" rel="stylesheet">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
              integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
        <title>Payment</title>
    </head>
    <body class="d-flex flex-column min-vh-100">
        <div id="nav-placeholder"></div>

        <div id="payment" class="w-50 m-auto p-5 shadow">
            <h2>Payment Information</h2>
            <form id="payment-form" method="POST" action="#" class="d-flex flex-column gap-3">
                <div class="d-flex flex-column">
                    <label for="firstName">First Name: </label>
                    <input name="firstName" type="text" id="firstName" required>
                </div>

                <div class="d-flex flex-column">
                    <label for="lastName">Last Name: </label>
                    <input name="lastName" type="text" id="lastName" required>
                </div>

                <div class="d-flex flex-column">
                    <label for="card">Credit Card Number: </label>
                    <input name="card" type="text" id="card" required>
                </div>

                <div class="d-flex flex-column">
                    <label for="expiration">Expiration Date: </label>
                    <input name="expiration" type="text" id="expiration" required>
                </div>

                <button type="submit" class="rounded p-2 text-white bg-dark">Place Order</button>
            </form>
        </div>

        <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.2.1/jquery.min.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.12.9/umd/popper.min.js"></script>
        <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/js/bootstrap.min.js"></script>

        <script>
            $("#nav-placeholder").load("nav.html");
        </script>

        <script src="scripts/index.js"></script>
    </body>
</html>

<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
        <link rel="icon" type="image/x-icon" href="images/favicon.ico">
        <link href="https://fonts.googleapis.com/css?family=Fugaz+One" rel="stylesheet">
        <link href="styles.css" rel="stylesheet">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
              integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
        <title>Results</title>
    </head>
    <body>
        <div id="nav-placeholder"></div>

        <div id="alert-container" class="d-flex flex-column position-sticky top-0 end-0"></div>

        <div id="movie-list" class="p-4">
            <h3>Results</h3>
            <form id="options-form" method="GET" action="#" class="d-flex align-items-center gap-3">
                <div>
                    <label for="pageSize">Movies Per Page: </label>
                    <select id="pageSize" name="pageSize">
                        <option value=10>10</option>
                        <option value=25>25</option>
                        <option value=50>50</option>
                        <option value=100>100</option>
                    </select>
                </div>

                <div>
                    <label for="sort">Sort by: </label>
                    <select id="sort" name="sort">
                        <option value="title-asc-rating-desc">Title ↑ Rating ↓</option>
                        <option value="title-desc-rating-asc">Title ↓ Rating ↑</option>
                        <option value="title-asc-rating-asc">Title ↑ Rating ↑</option>
                        <option value="title-desc-rating-desc">Title ↓ Rating ↓</option>
                        <option value="rating-asc-title-desc">Rating ↑ Title ↓</option>
                        <option value="rating-desc-title-asc">Rating ↓ Title ↑</option>
                        <option value="rating-asc-title-asc">Rating ↑ Title ↑</option>
                        <option value="title-desc-rating-desc">Rating ↓ Title ↓</option>
                    </select>
                </div>

                <button type="submit" class="rounded text-white bg-dark">Apply Changes</button>
            </form>
            <table id="movie-table" class="table table-striped">
                <thead>
                <tr>
                    <th>Title</th>
                    <th>Year</th>
                    <th>Director</th>
                    <th>Genres</th>
                    <th>Stars</th>
                    <th>Rating</th>
                    <th>Cart</th>
                </tr>
                </thead>
                <tbody id="movie-table-body"></tbody>
            </table>
            <div id="page-lookup" class="d-flex justify-content-center gap-2"></div>
        </div>

        <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.2.1/jquery.min.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.12.9/umd/popper.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
                integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

        <script>
            $("#nav-placeholder").load("nav.html");
        </script>

        <script src="scripts/list.js"></script>
    </body>
</html>

<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <link rel="icon" type="image/x-icon" href="images/favicon.ico">
    <link href="https://fonts.googleapis.com/css?family=Fugaz+One" rel="stylesheet">
    <link href="styles.css" rel="stylesheet">
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css"
          integrity="sha384-Gn5384xqQ1aoWXA+058RXPxPg6fy4IWvTNh0E263XmFcJlSAwiGgFAW/dAiS6JXm" crossorigin="anonymous">
    <title>Login</title>
</head>
    <body class="d-flex flex-column justify-content-center align-items-center bg-dark">
        <div id="banner">
            <img id="logo" src="images/brand.png" alt="Fablix logo">
            <p id="name">Fablix</p>
        </div>
        <div id="login" class="bg-white">
            <div id="login_error_message" class="alert alert-danger" role="alert"></div>
            <form id="login_form" method="POST" action="#">
                <label for="email">Email Address</label>
                <input name="email" type="email" id="email" required>

                <label for="password">Password</label>
                <input name="password" type="password" id="password" required>

                <button type="submit">Login</button>
            </form>
        </div>

        <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.2.1/jquery.min.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.12.9/umd/popper.min.js"></script>
        <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/js/bootstrap.min.js"></script>

        <script src="scripts/login.js"></script>
    </body>
</html>

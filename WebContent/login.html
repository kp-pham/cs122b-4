<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <link rel="icon" type="image/x-icon" href="images/favicon.ico">
    <link href="https://fonts.googleapis.com/css?family=Fugaz+One" rel="stylesheet">
    <link href="styles.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src='https://www.google.com/recaptcha/api.js' type="text/javascript"></script>
    <title>Login</title>
</head>
    <body class="d-flex flex-column justify-content-center align-items-center gap-4 min-vh-100 bg-dark">
        <div id="banner" class="d-flex align-items-center gap-3">
            <img id="logo" src="images/brand.png" alt="Fablix logo">
            <p id="name" class="m-0 text-white">Fablix</p>
        </div>

        <div id="login" class="p-5 rounded bg-white">
            <h2>Sign in</h2>
            <div id="login_error_message" class="alert alert-danger p-2 d-none" role="alert"></div>

            <form id="login_form" method="POST" action="#" class="d-flex flex-column gap-3">
                <div class="d-flex flex-column">
                    <label for="email">Email Address</label>
                    <input name="email" type="email" id="email" required autocomplete="email">
                </div>

                <div class="d-flex flex-column">
                    <label for="password">Password</label>
                    <input name="password" type="password" id="password" required>
                </div>

                <div class="g-recaptcha" data-sitekey="6LfFyLQsAAAAAEH9Qsv8cA2shg8ZJnSZ3Y1USNn4"></div>

                <button type="submit" class="rounded p-2 text-white bg-dark">Login</button>
            </form>
        </div>

        <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.2.1/jquery.min.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.12.9/umd/popper.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
                integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

        <script src="scripts/login.js"></script>
    </body>
</html>

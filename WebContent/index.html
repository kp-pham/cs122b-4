<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
        <link rel="icon" type="image/x-icon" href="images/favicon.ico">
        <link href="https://fonts.googleapis.com/css?family=Fugaz+One" rel="stylesheet">
        <link href="styles.css" rel="stylesheet">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
              integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
        <title>Fablix</title>
    </head>
    <body>
        <div id="nav-placeholder"></div>

        <div id="genres" class="d-flex flex-column gap-2 p-4">
            <h2 class="text-center">Browse by Genre</h2>
            <div id="genres-list"></div>
        </div>

        <div id="prefixes" class="d-flex flex-column gap-2 p-4">
            <h2 class="text-center">Browse by Title</h2>
            <div id="prefix-list" class="d-flex flex-wrap justify-content-center gap-2"></div>
        </div>

        <div id="search" class="d-flex flex-column gap-2 p-4">
            <h2 class="text-center">Search by Title, Year, Director, Star</h2>
            <form id="search-form" method="GET" action="api/search" class="d-flex flex-wrap justify-content-center gap-2">
                <input type="text" name="title" placeholder="Title">
                <input type="number" name="year" placeholder="Year">
                <input type="text" name="director" placeholder="Director">
                <input type="text" name="star" placeholder="Star">
                <button class="rounded p-2 text-white bg-dark">Search</button>
            </form>
        </div>

        <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.2.1/jquery.min.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.12.9/umd/popper.min.js"></script>
        <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/js/bootstrap.min.js"></script>

        <script>
            $("#nav-placeholder").load("nav.html");
        </script>

        <script src="scripts/index.js"></script>
    </body>
</html>
